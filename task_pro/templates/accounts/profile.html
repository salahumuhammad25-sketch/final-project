{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header"><h4>My Profile</h4></div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .login-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 15px;
        background: linear-gradient(135deg, #eef2ff, #f8fbff);
    }

    .login-card {
        width: 100%;
        max-width: 480px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 35px;
    }

    .login-title {
        font-size: 2rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 10px;
        text-align: center;
    }

    .login-subtitle {
        text-align: center;
        color: #64748b;
        margin-bottom: 30px;
    }

    .form-label {
        font-weight: 600;
        color: #334155;
        margin-bottom: 6px;
    }

    .form-control {
        border-radius: 12px;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        box-shadow: none;
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 0.15rem rgba(37, 99, 235, 0.15);
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        font-weight: 600;
        font-size: 1rem;
        transition: 0.3s ease;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .signup-link {
        text-align: center;
        margin-top: 18px;
        color: #64748b;
    }

    .signup-link a {
        text-decoration: none;
        color: #2563eb;
        font-weight: 600;
    }

    .alert {
        border-radius: 12px;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Login to continue to TaskPro</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="signup-link">
            Don’t have an account? <a href="{% url 'signup' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
